name: oms-knowledge-rag

x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
      ]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 30s

x-ollama-base: &ollama-base
  image: ollama/ollama:latest
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 10s

x-ollama-pull-base: &ollama-pull-base
  image: ollama/ollama:latest
  restart: "no"
  entrypoint:
    - /bin/sh
    - -lc
    - |
      set -eu
      until ollama list >/dev/null 2>&1; do
        echo "Waiting for Ollama at $${OLLAMA_HOST}..."
        sleep 2
      done
      ollama pull "$${OLLAMA_MODEL}"
      ollama pull "$${RAG_EMBEDDING_MODEL}"
      ollama pull "$${RAG_ROUTER_MODEL}"
  command: []

x-ollama-pull-env: &ollama-pull-env
  OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
  RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-embeddinggemma:latest}
  RAG_ROUTER_MODEL: ${RAG_ROUTER_MODEL:-qwen3:1.7b}

services:
  api-cpu:
    <<: *api-base
    profiles: ["cpu"]
    environment:
      RAG_CHROMA_DIR: /app/.chroma
      OLLAMA_HOST: http://ollama-cpu:11434
      RAG_LOCAL_OLLAMA_HOST: http://ollama-cpu:11434
    volumes:
      - type: bind
        source: ./docker-data/cpu/chroma
        target: /app/.chroma
        bind:
          create_host_path: true
      - type: bind
        source: ./logs
        target: /app/logs
        bind:
          create_host_path: true
      - type: bind
        source: ./exports
        target: /app/exports
        bind:
          create_host_path: true
    ports:
      - "${RAG_API_CPU_PORT:-8000}:8000"
    depends_on:
      ollama-cpu:
        condition: service_healthy
      ollama-pull-cpu:
        condition: service_completed_successfully

  ollama-cpu:
    <<: *ollama-base
    profiles: ["cpu"]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - type: bind
        source: ./docker-data/cpu/ollama
        target: /root/.ollama
        bind:
          create_host_path: true
    ports:
      - "${OLLAMA_CPU_PORT:-11434}:11434"

  ollama-pull-cpu:
    <<: *ollama-pull-base
    profiles: ["cpu"]
    environment:
      <<: *ollama-pull-env
      OLLAMA_HOST: http://ollama-cpu:11434
    depends_on:
      ollama-cpu:
        condition: service_healthy

  api-gpu-0:
    <<: *api-base
    profiles: ["gpu", "gpu0"]
    environment:
      RAG_CHROMA_DIR: /app/.chroma
      OLLAMA_HOST: http://ollama-gpu-0:11434
      RAG_LOCAL_OLLAMA_HOST: http://ollama-gpu-0:11434
    volumes:
      - type: bind
        source: ./docker-data/gpu0/chroma
        target: /app/.chroma
        bind:
          create_host_path: true
      - type: bind
        source: ./logs
        target: /app/logs
        bind:
          create_host_path: true
      - type: bind
        source: ./exports
        target: /app/exports
        bind:
          create_host_path: true
    ports:
      - "${RAG_API_GPU0_PORT:-8001}:8000"
    depends_on:
      ollama-gpu-0:
        condition: service_healthy
      ollama-pull-gpu-0:
        condition: service_completed_successfully

  ollama-gpu-0:
    <<: *ollama-base
    profiles: ["gpu", "gpu0"]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      NVIDIA_VISIBLE_DEVICES: "0"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - type: bind
        source: ./docker-data/gpu0/ollama
        target: /root/.ollama
        bind:
          create_host_path: true
    ports:
      - "${OLLAMA_GPU0_PORT:-11435}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["0"]
              capabilities: ["gpu"]

  ollama-pull-gpu-0:
    <<: *ollama-pull-base
    profiles: ["gpu", "gpu0"]
    environment:
      <<: *ollama-pull-env
      OLLAMA_HOST: http://ollama-gpu-0:11434
    depends_on:
      ollama-gpu-0:
        condition: service_healthy

  api-gpu-1:
    <<: *api-base
    profiles: ["gpu", "gpu1"]
    environment:
      RAG_CHROMA_DIR: /app/.chroma
      OLLAMA_HOST: http://ollama-gpu-1:11434
      RAG_LOCAL_OLLAMA_HOST: http://ollama-gpu-1:11434
    volumes:
      - type: bind
        source: ./docker-data/gpu1/chroma
        target: /app/.chroma
        bind:
          create_host_path: true
      - type: bind
        source: ./logs
        target: /app/logs
        bind:
          create_host_path: true
      - type: bind
        source: ./exports
        target: /app/exports
        bind:
          create_host_path: true
    ports:
      - "${RAG_API_GPU1_PORT:-8002}:8000"
    depends_on:
      ollama-gpu-1:
        condition: service_healthy
      ollama-pull-gpu-1:
        condition: service_completed_successfully

  ollama-gpu-1:
    <<: *ollama-base
    profiles: ["gpu", "gpu1"]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      NVIDIA_VISIBLE_DEVICES: "1"
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - type: bind
        source: ./docker-data/gpu1/ollama
        target: /root/.ollama
        bind:
          create_host_path: true
    ports:
      - "${OLLAMA_GPU1_PORT:-11436}:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: ["gpu"]

  ollama-pull-gpu-1:
    <<: *ollama-pull-base
    profiles: ["gpu", "gpu1"]
    environment:
      <<: *ollama-pull-env
      OLLAMA_HOST: http://ollama-gpu-1:11434
    depends_on:
      ollama-gpu-1:
        condition: service_healthy
