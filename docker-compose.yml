name: oms-knowledge-rag

x-api-base: &api-base
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env
  volumes:
    - type: bind
      source: ./docker-data/chroma
      target: /app/.chroma
      bind:
        create_host_path: true
    - type: bind
      source: ./logs
      target: /app/logs
      bind:
        create_host_path: true
    - type: bind
      source: ./exports
      target: /app/exports
      bind:
        create_host_path: true
  ports:
    - "${RAG_API_PORT:-8000}:8000"
  restart: unless-stopped
  healthcheck:
    test:
      [
        "CMD-SHELL",
        "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\"",
      ]
    interval: 30s
    timeout: 10s
    retries: 5
    start_period: 30s

x-ollama-base: &ollama-base
  image: ollama/ollama:latest
  environment:
    OLLAMA_HOST: 0.0.0.0:11434
  volumes:
    - type: bind
      source: ./docker-data/ollama
      target: /root/.ollama
      bind:
        create_host_path: true
  ports:
    - "${OLLAMA_PORT:-11434}:11434"
  restart: unless-stopped
  healthcheck:
    test: ["CMD-SHELL", "ollama list >/dev/null 2>&1"]
    interval: 10s
    timeout: 5s
    retries: 30
    start_period: 10s

x-ollama-pull-base: &ollama-pull-base
  image: ollama/ollama:latest
  restart: "no"
  entrypoint:
    - /bin/sh
    - -lc
    - |
      set -eu
      until ollama list >/dev/null 2>&1; do
        echo "Waiting for Ollama at $${OLLAMA_HOST}..."
        sleep 2
      done
      ollama pull "$${OLLAMA_MODEL}"
      ollama pull "$${RAG_EMBEDDING_MODEL}"
      ollama pull "$${RAG_ROUTER_MODEL}"
      ollama pull "$${RAG_RERANKER_MODEL}"
  command: []
  environment: &ollama-pull-env
    OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:4b-instruct}
    RAG_EMBEDDING_MODEL: ${RAG_EMBEDDING_MODEL:-embeddinggemma:latest}
    RAG_ROUTER_MODEL: ${RAG_ROUTER_MODEL:-qwen3:1.7b}
    RAG_RERANKER_MODEL: ${RAG_RERANKER_MODEL:-qllama/bge-reranker-v2-m3:latest}

services:
  api:
    <<: *api-base
    profiles: ["cpu"]
    environment:
      RAG_CHROMA_DIR: /app/.chroma
      OLLAMA_HOST: http://ollama:11434
      RAG_LOCAL_OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  ollama:
    <<: *ollama-base
    profiles: ["cpu"]

  ollama-pull:
    <<: *ollama-pull-base
    profiles: ["cpu"]
    environment:
      <<: *ollama-pull-env
      OLLAMA_HOST: http://ollama:11434
    depends_on:
      ollama:
        condition: service_healthy

  api-gpu:
    <<: *api-base
    profiles: ["gpu"]
    environment:
      RAG_CHROMA_DIR: /app/.chroma
      OLLAMA_HOST: http://ollama-gpu:11434
      RAG_LOCAL_OLLAMA_HOST: http://ollama-gpu:11434
    depends_on:
      ollama-gpu:
        condition: service_healthy
      ollama-pull-gpu:
        condition: service_completed_successfully

  ollama-gpu:
    <<: *ollama-base
    profiles: ["gpu"]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]

  ollama-pull-gpu:
    <<: *ollama-pull-base
    profiles: ["gpu"]
    environment:
      <<: *ollama-pull-env
      OLLAMA_HOST: http://ollama-gpu:11434
    depends_on:
      ollama-gpu:
        condition: service_healthy
